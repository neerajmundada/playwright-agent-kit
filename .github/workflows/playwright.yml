name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_ENV: test
  CI: true
  CI_BUILD_ID: ${{ github.run_id }}
  CI_COMMIT_SHA: ${{ github.sha }}
  BASE_URL: ${{ vars.BASE_URL }}
  API_BASE_URL: ${{ vars.API_BASE_URL }}

jobs:
  validate-env:
    name: Validate environment config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run validate:env

  security-scan:
    name: Security scan (Snyk)
    runs-on: ubuntu-latest
    needs: validate-env
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run Snyk scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::SNYK_TOKEN not configured - skipping security scan"
            exit 0
          fi
          npm run security:scan

  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    needs: validate-env
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox

      - name: Run UI tests (priority-gated) and archive reports
        # Explicitly scoped to the UI projects - the "api" project (Petstore
        # tests) is deliberately excluded from this auto-triggered pipeline.
        # See .github/workflows/api-tests.yml (manual dispatch only).
        run: npm run test:ci -- --project=priority-gate --project=chromium --project=firefox

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/html
          retention-days: 30

      - name: Upload archived reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-archive
          path: reports-archive
          retention-days: 90

      - name: Write job summary
        if: always()
        run: |
          echo "## Playwright Test Run" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/results.json ]; then
            node -e "
              const r = require('./reports/results.json');
              let total=0, passed=0, failed=0;
              const walk = (suites) => (suites||[]).forEach(s => {
                (s.specs||[]).forEach(spec => (spec.tests||[]).forEach(t => {
                  total++;
                  const status = t.status || (t.results && t.results[t.results.length-1]?.status);
                  if (status === 'expected') passed++;
                  else if (status === 'unexpected') failed++;
                }));
                walk(s.suites);
              });
              walk(r.suites);
              console.log(\`- Total: \${total}\n- Passed: \${passed}\n- Failed: \${failed}\`);
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::Playwright test run failed - see uploaded report artifact for details."
